name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow the workflow to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject admin password secret into index.html
        # Uses Python to safely replace the placeholder — handles special characters in the password
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          python3 -c "
          import os
          pwd = os.environ['ADMIN_PASSWORD']
          with open('index.html', 'r') as f:
              content = f.read()
          content = content.replace('__ADMIN_PASSWORD__', pwd)
          with open('index.html', 'w') as f:
              f.write(content)
          print('Password injected successfully')
          "

      - name: Upload site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root (index.html + msal-browser.min.js)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

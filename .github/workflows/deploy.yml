name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow the workflow to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject admin password secret into index.html
        # Replaces the __ADMIN_PASSWORD__ placeholder with the real secret.
        # The secret is never written to disk as plaintext — sed pipes it directly.
        run: |
          sed -i "s|__ADMIN_PASSWORD__|${{ secrets.ADMIN_PASSWORD }}|g" index.html

      - name: Upload site to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root (index.html + msal-browser.min.js)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
